<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人介绍</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 30px;
        }
        .card {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        /* 头像样式 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* 圆形头像 */
            object-fit: cover;
            border: 3px solid #2980b9;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
            margin: 0 0 20px 0;
        }
        .info {
            font-size: 16px;
            line-height: 1.8;
            color: #34495e;
            text-align: left;
        }
        .label {
            font-weight: bold;
            color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 头像标签 -->
        <img class="avatar" src="avatar.jpg" alt="个人头像">
        <h1>个人介绍</h1>
        <div class="info">
            <p><span class="label">姓名：</span>pareo</p>
            <p><span class="label">年龄：</span>28岁</p>
            <p><span class="label">职业：</span>前端开发 / 学生 / 自由职业</p>
            <p><span class="label">爱好：</span>编程、阅读、运动、听音乐</p>
            <p><span class="label">擅长：</span>HTML、CSS、JavaScript、Python</p>
            <p><span class="label">个人简介：</span><br>热爱技术，喜欢学习新知识，做事认真负责，乐于沟通与分享。</p>
        </div>
    </div>
</body>
</html>
