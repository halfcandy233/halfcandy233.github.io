<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端适配核心标签 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #FFB6C1;
            background-image: linear-gradient(135deg, #FFB6C1, #66CCFF, #FFB6C1);
            min-height: 100vh;
            padding: 20px 110px;
            animation: bgMove 8s linear infinite;
            position: relative;
        }

        /* 左右侧边初音小图 */
        .side-miku {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 560px;
            z-index: 1;
        }
        .left-miku { left: 30px; }
        .right-miku { right: 30px; }
        .side-miku img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(255,105,180,0.3);
        }

        @keyframes bgMove {
            0% { background-position: 0 0; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0 0; }
        }

        .card {
            max-width: 550px;
            margin: 50px auto;
    /* 名片改成柔和初音蓝，和背景自然融合 */
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(255, 105, 180, 0.2);
            text-align: center;
            border: 3px solid #ff8ad5;
            position: relative;
            overflow: hidden;
            z-index: 2;
        }

        /* 花边装饰 */
        .card::before {
            content: "♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡";
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            color: #ff8fab;
            font-size: 18px;
            letter-spacing: 8px;
        }
        .card::after {
            content: "♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡";
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            color: #ff8fab;
            font-size: 18px;
            letter-spacing: 8px;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff87ab;
            box-shadow: 0 0 15px rgba(255, 135, 171, 0.4);
            margin-bottom: 20px;
            animation: avatarGlow 3s ease-in-out infinite;
        }

        @keyframes avatarGlow {
            0% { box-shadow: 0 0 15px #ff87ab; }
            50% { box-shadow: 0 0 25px #ff5c8d; }
            100% { box-shadow: 0 0 15px #ff87ab; }
        }

        h1 {
            color: #39C5BB;
            font-size: 28px;
            margin-bottom: 25px;
            text-shadow: 1px 1px 3px rgba(255, 135, 171, 0.3);
        }

        .info {
            font-size: 17px;
            line-height: 2;
            color: #39C5BB;
            text-align: left;
        }

        .label {
            font-weight: bold;
            color: #ff5c8d;
        }

        /* 顶部、底部初音大图 */
        .miku-full {
            max-width: 560px;
            margin: 0 auto;
            text-align: center;
        }
        .miku-full img {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        /* 四角图片样式 */
        .corner-img {
            position: absolute;
            width: 560px;
            z-index: 1;
        }
        .corner-img img {
            width: 100%;
            display: block;
            border-radius: 12px;
        }
        .top-left {
            top: 20px;
            left: 30px;
        }
        .top-right {
            top: 20px;
            right: 30px;
        }
        .bottom-left {
            bottom: 20px;
            left: 30px;
        }
        .bottom-right {
            bottom: 20px;
            right: 30px;
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            body {
                padding: 20px;
            }
            /* 手机隐藏左右侧边图，解决重叠 */
            .side-miku {
                display: none;
            }
            /* 缩小四角图 */
            .corner-img {
                width: 90px;
            }
            .top-left {
                top: 10px;
                left: 10px;
            }
            .top-right {
                top: 10px;
                right: 10px;
            }
            .bottom-left {
                bottom: 10px;
                left: 10px;
            }
            .bottom-right {
                bottom: 10px;
                right: 10px;
            }
            .miku-full {
                margin: 10px auto;
            }
        }
        .float-img {
          position: absolute;
          width: 160px;
          transition: all 2.5s ease-out;
          pointer-events: auto;
          z-index: 999;
         }
    </style>
</head>
<body>
    <!-- 左侧固定初音 -->
    <div class="side-miku left-miku">
        <img src="miku1.png" alt="初音未来">
    </div>
    <!-- 右侧固定初音 -->
    <div class="side-miku right-miku">
        <img src="miku2.png" alt="初音未来">
    </div>

    <!-- 顶部初音大图 -->
    <div class="miku-full">
        <img src="miku3.png" alt="初音未来">
    </div>

    <div class="card">
        <img class="avatar" src="avatar.jpg" alt="个人头像">
        <h1>个人介绍</h1>

        <audio id="bgMusic" loop>
          <source src="electricangle.mp3" type="audio/mpeg">
  浏览器不支持音频播放
        </audio>


        <button id="playBtn" style="padding:6px 16px; border:none; border-radius:20px; background:#39C5BB; color:#fff; font-size:14px; cursor:pointer; margin:10px 0;">
  开启背景音乐
        </button>

        <script>
          const audio = document.getElementById('bgMusic');
          const btn = document.getElementById('playBtn');
          let isPlaying = false;

          btn.addEventListener('click', () => {
            if (!isPlaying) {
              audio.play().then(() => {
                btn.textContent = '暂停背景音乐';
                isPlaying = true;
              }).catch(err => {
                alert('播放失败，请检查文件路径是否正确');
                console.error(err);
              });
            } else {
              audio.pause();
              btn.textContent = '开启背景音乐';
              isPlaying = false;
            }
          });
        </script>

        <div style="display: flex; justify-content: center; margin: 20px 0;">
        <video width="500" controls loop muted autoplay>
          <source src="an.mp4" type="video/mp4">
  您的浏览器不支持视频播放
        </video>
        </div>
    
        <div class="info">
            <p><span class="label">姓名：</span>pareo</p>
            <p><span class="label">年龄：</span>28岁</p>
            <p><span class="label">职业：</span>前端开发 / 大数据分析 / 机器学习</p>
            <p><span class="label">爱好：</span>编程、阅读、运动、听音乐、玩游戏</p>
            <p><span class="label">擅长：</span>HTML、CSS、JavaScript、Python</p>
            <p><span class="label">个人简介：</span><br>热爱技术，喜欢学习新知识，做事认真负责，乐于沟通与分享。</p>

            <!-- B站图片链接 -->
            <a href="https://www.bilibili.com/" target="_blank" style="margin-top:20px;display:inline-block;">
              <img src="favicon.ico" alt="B站" style="width:40px;height:40px;">
            </a>
        </div>
    </div>

    <!-- 底部初音大图 -->
    <div class="miku-full">
        <img src="miku4.png" alt="初音未来">
    </div>

    <!-- 四角图片 -->
    <div class="corner-img top-left">
        <img src="miku5.png" alt="角落初音">
    </div>
    <div class="corner-img top-right">
        <img src="miku6.png" alt="角落初音">
    </div>
    <div class="corner-img bottom-left">
        <img src="miku7.png" alt="角落初音">
    </div>
    <div class="corner-img bottom-right">
        <img src="miku8.png" alt="角落初音">
    </div>

    <a href="https://acgngames.net/" target="_blank">
      <img src="miku9.gif" class="float-img">
    </a>

    <script>
    const img = document.querySelector(".float-img");
    function move() {
      let maxX = window.innerWidth - img.offsetWidth;
      let maxY = window.innerHeight - img.offsetHeight;
      img.style.left = Math.random() * maxX + "px";
      img.style.top = Math.random() * maxY + "px";
    }
    setInterval(move, 3500);
    window.onload = move;
    </script>
</body>
</html>
